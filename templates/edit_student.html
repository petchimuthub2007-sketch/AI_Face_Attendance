<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
        }

        .container{
            width:400px;
            margin:50px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px gray;
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            background:#007bff;
            color:white;
            border:none;
            cursor:pointer;
        }

        a{
            display:block;
            text-align:center;
            margin-top:15px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Edit Student</h2>

<form method="POST">

<label>Student Name</label>
<input
type="text"
name="student_name"
value="{{ student.student_name }}"
required>

<label>Department</label>
<input
type="text"
name="department"
value="{{ student.department }}"
required>

<label>Year</label>
<input
type="text"
name="year"
value="{{ student.year }}"
required>

<button type="submit">
Update Student
</button>

</form>

<a href="/students">⬅ Back</a>

</div>

</body>
</html>
