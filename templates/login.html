<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — AI Face Attendance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0B0F14;
    --surface: #121821;
    --surface-raised: #161D27;
    --border: #212B36;
    --border-strong: #2C3947;
    --accent: #00E5A0;
    --accent-dim: #0A7A5B;
    --danger: #FF5A5A;
    --text-primary: #E8EDF2;
    --text-secondary: #8A95A2;
    --text-muted: #566270;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  body{
    min-height: 100vh;
    background:
      radial-gradient(circle at 1px 1px, #1A2330 1px, transparent 0) 0 0 / 28px 28px,
      var(--bg);
    color: var(--text-primary);
    font-family: var(--font-body);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .frame{
    position: relative;
    width: 100%;
    max-width: 400px;
    padding: 26px;
  }

  .bracket{
    position: absolute;
    width: 26px;
    height: 26px;
    border: 2px solid var(--accent);
    opacity: 0;
    animation: lockon 0.7s ease-out forwards;
  }
  .bracket.tl{ top: 0; left: 0; border-right: none; border-bottom: none; animation-delay: 0.05s; }
  .bracket.tr{ top: 0; right: 0; border-left: none; border-bottom: none; animation-delay: 0.15s; }
  .bracket.bl{ bottom: 0; left: 0; border-right: none; border-top: none; animation-delay: 0.15s; }
  .bracket.br{ bottom: 0; right: 0; border-left: none; border-top: none; animation-delay: 0.25s; }

  @keyframes lockon{
    from{ opacity: 0; transform: scale(1.15); }
    to{ opacity: 1; transform: scale(1); }
  }

  .card{
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 40px 34px 32px;
    overflow: hidden;
    animation: fade-in 0.5s ease-out 0.3s both;
  }

  @keyframes fade-in{
    from{ opacity: 0; transform: translateY(6px); }
    to{ opacity: 1; transform: translateY(0); }
  }

  .scanline{
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    top: 0;
    animation: sweep 2.6s linear infinite;
    animation-delay: 0.9s;
    opacity: 0;
  }
  @keyframes sweep{
    0%{ top: 0; opacity: 0; }
    5%{ opacity: 0.9; }
    45%{ opacity: 0.9; }
    50%{ opacity: 0; }
    100%{ top: 100%; opacity: 0; }
  }

  .status-row{
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 22px;
  }
  .status-dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{ 0%,100%{ opacity: 1; } 50%{ opacity: 0.3; } }

  h1{
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .subtitle{
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .field{
    margin-bottom: 18px;
  }
  .field label{
    display: block;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }
  .field input{
    width: 100%;
    background: var(--surface-raised);
    border: 1px solid var(--border-strong);
    border-radius: 3px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field input::placeholder{ color: var(--text-muted); }
  .field input:focus{
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.12);
  }

  .error-box{
    display: none;
    align-items: flex-start;
    gap: 8px;
    background: rgba(255, 90, 90, 0.08);
    border: 1px solid rgba(255, 90, 90, 0.3);
    border-radius: 3px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 18px;
  }
  .error-box.visible{ display: flex; }

  button[type="submit"]{
    width: 100%;
    background: var(--accent);
    color: #04140F;
    font-family: var(--font-display);
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.02em;
    border: none;
    border-radius: 3px;
    padding: 13px;
    cursor: pointer;
    margin-top: 8px;
    transition: background 0.15s ease, transform 0.1s ease;
  }
  button[type="submit"]:hover{ background: #1AF0B4; }
  button[type="submit"]:active{ transform: scale(0.99); }

  .footnote{
    margin-top: 22px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>

  <div class="frame">
    <div class="bracket tl"></div>
    <div class="bracket tr"></div>
    <div class="bracket bl"></div>
    <div class="bracket br"></div>

    <div class="card">
      <div class="scanline"></div>

      <div class="status-row">
        <span class="status-dot"></span>
        <span>System ready</span>
      </div>

      <h1>AI Face Attendance</h1>
      <p class="subtitle">Sign in to access the admin dashboard.</p>

      {% if error %}
      <div class="error-box visible">
        <span>{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="admin" autocomplete="username" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit">Sign in</button>
      </form>

      <p class="footnote">Register / capture / recognize — access restricted to admin</p>
    </div>
  </div>

</body>
</html>
