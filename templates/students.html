<!DOCTYPE html>
<html>
<head>
    <title>Students List</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            margin:0;
        }

        h1{
            text-align:center;
            margin-top:30px;
        }

        table{
            width:90%;
            margin:30px auto;
            border-collapse:collapse;
            background:white;
            box-shadow:0 0 10px gray;
        }

        th{
            background:#007bff;
            color:white;
            padding:12px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        .back{
            display:block;
            width:180px;
            margin:20px auto;
            text-align:center;
            background:#28a745;
            color:white;
            padding:12px;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<h1>Registered Students</h1>

<table>

<tr>
    <th>Student Name</th>
    <th>Register Number</th>
    <th>Department</th>
    <th>Year</th>
    <th>Action</th>
</tr>

{% for student in data %}

<tr>
    <td>{{ student.student_name }}</td>
    <td>{{ student.register_number }}</td>
    <td>{{ student.department }}</td>
    <td>{{ student.year }}</td>

    <td>
    <a href="/edit_student/{{ student.register_number }}">
        <button>Edit</button>
    </a>

    <a href="/delete_student/{{ student.register_number }}"
       onclick="return confirm('Are you sure you want to delete this student?');">

        <button style="background:red;color:white;">
            Delete
        </button>

    </a>
</td>
</tr>

{% endfor %}

</table>

<a href="/dashboard" class="back">⬅ Back to Dashboard</a>

</body>
</html>
